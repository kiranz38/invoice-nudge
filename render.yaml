services:
  - type: web
    name: invoice-nudge-api
    plan: free
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: invoice-nudge-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: invoicenudge@jumproo.ai
      - key: FRONTEND_URL
        value: https://invoicenudge.aristocles.com.au
      - key: ALLOWED_ORIGINS
        value: https://invoicenudge.aristocles.com.au,https://www.invoicenudge.aristocles.com.au
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_ENTERPRISE_PRICE_ID
        sync: false

databases:
  - name: invoice-nudge-db
    plan: free
    databaseName: invoice_nudge
    postgresMajorVersion: 16
